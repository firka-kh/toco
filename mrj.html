<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Механизм рассмотрения жалоб</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Sora:wght@600;700&display=swap');

        :root {
            --bg-a: #ecf7ff;
            --bg-b: #e8fff4;
            --ink: #0f2d46;
            --muted: #5f7890;
            --card: rgba(255, 255, 255, 0.78);
            --line: rgba(20, 62, 95, 0.13);
            --wa-a: #23d366;
            --wa-b: #0f9d7c;
            --call-a: #2f76ff;
            --call-b: #1558d6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Manrope', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 22px;
            background:
                radial-gradient(1200px 700px at 0% 0%, #d9f0ff 0%, transparent 62%),
                radial-gradient(900px 700px at 100% 15%, #d8ffe5 0%, transparent 58%),
                radial-gradient(900px 900px at 70% 100%, #dbecff 0%, transparent 55%),
                linear-gradient(140deg, var(--bg-a), var(--bg-b));
            overflow-x: hidden;
            position: relative;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            z-index: 0;
            border-radius: 999px;
            filter: blur(14px);
            animation: drift 10s ease-in-out infinite;
            pointer-events: none;
        }

        body::before {
            width: 240px;
            height: 240px;
            top: -50px;
            right: -30px;
            background: rgba(35, 211, 102, 0.18);
        }

        body::after {
            width: 260px;
            height: 260px;
            bottom: -70px;
            left: -40px;
            background: rgba(47, 118, 255, 0.14);
            animation-delay: -3s;
        }

        @keyframes drift {

            0%,
            100% {
                transform: translateY(0px) scale(1);
            }

            50% {
                transform: translateY(14px) scale(1.04);
            }
        }

        .card {
            width: min(640px, 100%);
            position: relative;
            z-index: 1;
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow:
                0 30px 70px rgba(12, 45, 72, 0.16),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            padding: clamp(20px, 4vw, 34px) clamp(16px, 4vw, 28px) clamp(16px, 3vw, 26px);
            text-align: center;
            animation: rise 0.8s cubic-bezier(.17, .84, .44, 1) both;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .wa-icon-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .wa-icon-bg {
            width: 84px;
            height: 84px;
            border-radius: 26px;
            display: grid;
            place-items: center;
            background: linear-gradient(135deg, var(--wa-a), var(--wa-b));
            box-shadow: 0 16px 32px rgba(35, 211, 102, 0.34);
            transform: rotate(-6deg);
        }

        .wa-icon-bg svg {
            width: 46px;
            height: 46px;
            transform: rotate(6deg);
        }

        h1 {
            font-family: 'Sora', sans-serif;
            font-size: clamp(1.5rem, 4.3vw, 2.05rem);
            line-height: 1.16;
            margin-bottom: 10px;
            letter-spacing: -0.03em;
        }

        .project-tag {
            display: inline-block;
            font-size: 0.77rem;
            font-weight: 700;
            color: #12466e;
            background: linear-gradient(180deg, #eff8ff, #e5f3ff);
            border: 1px solid #d4e8f9;
            border-radius: 999px;
            padding: 8px 14px;
            margin-bottom: 15px;
        }

        .invite {
            color: var(--muted);
            font-size: 0.98rem;
            line-height: 1.58;
            margin-bottom: 18px;
        }

        .button-stack {
            display: grid;
            gap: 10px;
            margin-bottom: 16px;
        }

        .btn-wa,
        .btn-call {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 11px;
            border-radius: 16px;
            padding: 15px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 800;
            font-size: clamp(0.9rem, 2.7vw, 1rem);
            letter-spacing: 0.01em;
            isolation: isolate;
            overflow: hidden;
            transition: transform .16s ease, box-shadow .16s ease;
            min-height: 54px;
            text-wrap: balance;
            background-size: 180% 180%;
            animation: gradientFlow 6s ease-in-out infinite;
        }

        .btn-wa {
            background: linear-gradient(135deg, var(--wa-a), var(--wa-b));
            box-shadow: 0 14px 26px rgba(35, 211, 102, 0.34);
        }

        .btn-call {
            background: linear-gradient(135deg, var(--call-a), var(--call-b));
            box-shadow: 0 14px 26px rgba(21, 88, 214, 0.32);
        }

        .btn-wa::before,
        .btn-call::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(105deg, transparent 20%, rgba(255, 255, 255, 0.34) 50%, transparent 80%);
            z-index: -1;
        }

        .btn-wa::before {
            animation: sheen-right-to-left 2.8s linear infinite;
        }

        .btn-call::before {
            animation: sheen-left-to-right 2.8s linear infinite;
        }

        @keyframes sheen-left-to-right {
            0% {
                transform: translateX(-115%);
            }

            100% {
                transform: translateX(115%);
            }
        }

        @keyframes sheen-right-to-left {
            0% {
                transform: translateX(115%);
            }

            100% {
                transform: translateX(-115%);
            }
        }

        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .btn-wa:hover,
        .btn-call:hover {
            transform: translateY(-2px);
        }

        .btn-wa:hover {
            box-shadow: 0 18px 34px rgba(35, 211, 102, 0.45);
        }

        .btn-call:hover {
            box-shadow: 0 18px 34px rgba(21, 88, 214, 0.43);
        }

        .btn-wa:active,
        .btn-call:active {
            transform: translateY(0);
        }

        .btn-wa:focus-visible,
        .btn-call:focus-visible {
            outline: 3px solid rgba(20, 95, 156, 0.28);
            outline-offset: 2px;
        }

        .btn-wa svg,
        .btn-call svg {
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .info-list {
            display: flex;
            justify-content: center;
        }

        .info-row {
            width: 100%;
            max-width: 320px;
            display: flex;
            align-items: center;
            gap: 11px;
            text-align: left;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid #d9ebf6;
            border-radius: 14px;
            padding: 10px 13px;
        }

        .info-row .ico {
            width: 33px;
            height: 33px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            background: #eaf4ff;
            font-size: 1.04rem;
        }

        .info-row .lbl {
            font-size: 0.74rem;
            color: #6f869d;
        }

        .info-row .val {
            font-size: 0.92rem;
            font-weight: 800;
            color: #163f61;
        }

        @media (max-width: 520px) {
            body {
                padding: 14px;
            }

            .card {
                border-radius: 24px;
                padding: 24px 16px 18px;
            }

            .wa-icon-bg {
                width: 70px;
                height: 70px;
                border-radius: 20px;
            }

            .wa-icon-bg svg {
                width: 38px;
                height: 38px;
            }

            .btn-wa,
            .btn-call {
                border-radius: 14px;
                padding: 13px 14px;
                font-size: 0.95rem;
                min-height: 50px;
            }
        }

        @media (max-width: 360px) {
            .project-tag {
                font-size: 0.69rem;
                padding: 7px 10px;
            }

            .invite {
                font-size: 0.9rem;
            }
        }

        @media (min-width: 700px) and (max-width: 1100px) {
            body {
                padding: 28px;
            }

            .card {
                width: min(760px, 100%);
                border-radius: 34px;
            }

            .button-stack {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
